name: CI / CD — RCMLight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Test ──────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rcmlight
          POSTGRES_PASSWORD: rcmlight_test
          POSTGRES_DB: rcmlight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://rcmlight:rcmlight_test@localhost:5432/rcmlight_test
      - run: npm test
        env:
          DATABASE_URL: postgresql://rcmlight:rcmlight_test@localhost:5432/rcmlight_test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          RATE_LIMIT_AUTH_MAX: '1000'

  # ── Build & push images ───────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/rcmlight-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/rcmlight-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: |
            ${{ env.REGISTRY }}/rcmlight-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/rcmlight-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/rcmlight
            echo "REGISTRY=${{ env.REGISTRY }}" > .env.deploy
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env.deploy
            cat .env.prod >> .env.deploy
            docker compose -f docker-compose.prod.yml --env-file .env.deploy pull
            docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --remove-orphans
            docker image prune -f
