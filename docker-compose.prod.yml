version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: rcmlight_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    image: ${REGISTRY}/rcmlight-backend:${IMAGE_TAG:-latest}
    container_name: rcmlight_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: 3001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - internal
      - proxy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    image: ${REGISTRY}/rcmlight-frontend:${IMAGE_TAG:-latest}
    container_name: rcmlight_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles: ['certbot']

volumes:
  pgdata:
  certbot_certs:
  certbot_www:

networks:
  internal:
  proxy:
